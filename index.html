<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>☠ The Haunted Maze</title>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blood: #8b0000;
      --glow-red: #ff3333;
      --dim: #0a0005;
      --path-dark: #0d0010;
      --wall-color: #1a0015;
    }

    body {
      background: var(--dim);
      color: #d4a0ff;
      font-family: 'Special Elite', cursive;
      min-height: 100dvh;
      overflow: hidden;
    }

    /* ── SCREENS ── */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 100dvh;
      padding: 24px 16px;
    }
    .screen.active { display: flex; }

    /* ── BLOOD DRIPS ── */
    .drip {
      position: fixed;
      top: -2px;
      width: 4px;
      border-radius: 0 0 4px 4px;
      background: linear-gradient(180deg, #6b0000 0%, #cc0000 40%, transparent 100%);
      pointer-events: none;
      z-index: 1;
      animation: dripDown var(--d) ease-in var(--delay) infinite both;
    }
    @keyframes dripDown {
      0%   { height: 0; opacity: 0.8; }
      60%  { height: 28vh; opacity: 0.6; }
      100% { height: 28vh; opacity: 0; }
    }

    /* ── START SCREEN ── */
    #start-screen {
      background: radial-gradient(ellipse at 50% 60%, #1a0015 0%, #060004 65%);
      text-align: center;
      gap: 10px;
    }

    .skull-row {
      font-size: 2rem;
      opacity: 0.35;
      letter-spacing: 8px;
      margin-bottom: 4px;
    }

    .main-title {
      font-family: 'Creepster', cursive;
      font-size: clamp(2.8rem, 11vw, 5.5rem);
      color: var(--glow-red);
      line-height: 1;
      text-shadow: 0 0 12px #ff0000, 0 0 35px #ff000066, 0 0 70px #ff000033;
      animation: flicker 4s infinite;
      letter-spacing: 4px;
    }
    @keyframes flicker {
      0%,89%,93%,97%,100% { opacity: 1; text-shadow: 0 0 12px #ff0000, 0 0 35px #ff000066; }
      90%  { opacity: 0.3; text-shadow: none; }
      94%  { opacity: 0.8; }
      96%  { opacity: 0.2; text-shadow: none; }
    }

    .tagline {
      color: #554455;
      font-size: 0.8rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 30px;
    }

    .form-wrapper {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 340px;
    }

    .name-input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255,255,255,0.03);
      border: 1.5px solid #440033;
      border-radius: 3px;
      color: #ffcccc;
      font-family: 'Special Elite', cursive;
      font-size: 1.05rem;
      text-align: center;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      letter-spacing: 2px;
    }
    .name-input::placeholder { color: #442233; }
    .name-input:focus {
      border-color: var(--glow-red);
      box-shadow: 0 0 18px rgba(255,51,51,0.25);
    }
    .name-input.error { border-color: #ff0000; animation: shake 0.3s; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }

    .enter-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #6b0000, #8b0000);
      border: 1.5px solid var(--glow-red);
      border-radius: 3px;
      color: #ffcccc;
      font-family: 'Creepster', cursive;
      font-size: 1.5rem;
      letter-spacing: 6px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      touch-action: manipulation;
    }
    .enter-btn:hover, .enter-btn:active {
      background: linear-gradient(135deg, #8b0000, #aa0000);
      box-shadow: 0 0 28px rgba(255,51,51,0.4);
      transform: translateY(-1px);
    }

    .warning {
      color: #442233;
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 18px;
    }

    /* ── GAME SCREEN ── */
    #game-screen {
      background: #060008;
      gap: 12px;
      justify-content: center;
    }

    .hud {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Creepster', cursive;
      color: #cc3333;
      font-size: 1.15rem;
      letter-spacing: 3px;
    }

    #maze-canvas {
      border: 2px solid #2a0020;
      border-radius: 4px;
      box-shadow:
        0 0 40px rgba(180,0,60,0.15),
        0 0 6px rgba(180,0,60,0.3),
        inset 0 0 40px rgba(0,0,0,0.6);
      display: block;
      max-width: 95vw;
    }

    /* D-Pad */
    .dpad {
      display: grid;
      grid-template-areas: ". u ." "l . r" ". d .";
      gap: 6px;
    }
    .dpad-btn {
      width: 58px;
      height: 58px;
      background: rgba(100,0,40,0.35);
      border: 1.5px solid #550033;
      border-radius: 10px;
      color: #cc7799;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.08s, transform 0.08s;
      touch-action: manipulation;
    }
    .dpad-btn:active { background: rgba(180,0,60,0.55); transform: scale(0.92); }
    .dpad-btn.u { grid-area: u; }
    .dpad-btn.l { grid-area: l; }
    .dpad-btn.r { grid-area: r; }
    .dpad-btn.d { grid-area: d; }

    .game-hint {
      color: #332233;
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ── JUMPSCARE OVERLAY ── */
    #jumpscare-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      animation: bgFlash 0.08s infinite;
      overflow: hidden;
    }
    #jumpscare-overlay.show { display: flex; }

    @keyframes bgFlash {
      0%   { background: #cc0000; }
      49%  { background: #cc0000; }
      50%  { background: #000000; }
      100% { background: #000000; }
    }

    .ghost-face {
      position: relative;
      animation: scareShake 0.06s infinite;
    }
    @keyframes scareShake {
      0%   { transform: translate(-6px,-4px) rotate(-3deg) scale(1.00); }
      25%  { transform: translate( 6px, 5px) rotate( 3deg) scale(1.06); }
      50%  { transform: translate(-4px, 6px) rotate(-2deg) scale(0.97); }
      75%  { transform: translate( 4px,-5px) rotate( 2deg) scale(1.03); }
    }

    /* CSS ghost */
    .ghost-body {
      width: 52vmin;
      height: 52vmin;
      background: radial-gradient(ellipse at 50% 40%, #ffffff 0%, #dddddd 50%, transparent 100%);
      border-radius: 50% 50% 0 0;
      position: relative;
      filter: drop-shadow(0 0 30px rgba(255,255,255,0.9));
    }
    .ghost-body::after {
      content: '';
      position: absolute;
      bottom: -14%;
      left: 0;
      width: 100%;
      height: 30%;
      background: linear-gradient(90deg,
        #e0e0e0 0%, #e0e0e0 20%,
        transparent 20%, transparent 33%,
        #e0e0e0 33%, #e0e0e0 53%,
        transparent 53%, transparent 66%,
        #e0e0e0 66%, #e0e0e0 86%,
        transparent 86%, transparent 100%
      );
      clip-path: polygon(
        0% 0%, 20% 0%, 25% 100%, 30% 0%, 53% 0%, 58% 100%, 63% 0%, 86% 0%, 91% 100%, 96% 0%, 100% 0%,
        100% 0%, 100% 100%, 0% 100%
      );
    }
    .ghost-eyes {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 18%;
      width: 60%;
      justify-content: center;
    }
    .ghost-eye {
      width: 25%;
      aspect-ratio: 1;
      background: #000;
      border-radius: 50%;
      position: relative;
      box-shadow: 0 0 8px #000;
    }
    .ghost-eye::after {
      content: '';
      position: absolute;
      top: 20%;
      left: 20%;
      width: 35%;
      height: 35%;
      background: #fff;
      border-radius: 50%;
    }
    .ghost-mouth {
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translateX(-50%);
      width: 40%;
      height: 16%;
      background: #000;
      border-radius: 0 0 50% 50%;
      box-shadow: 0 0 6px #000;
    }

    /* ── WIN SCREEN ── */
    #win-screen {
      background: radial-gradient(ellipse at 50% 50%, #001a00 0%, #000700 70%);
      text-align: center;
      gap: 18px;
    }

    .win-title {
      font-family: 'Creepster', cursive;
      font-size: clamp(2.5rem, 10vw, 5rem);
      color: #00ff66;
      text-shadow: 0 0 20px #00ff66, 0 0 50px #00ff6655;
      letter-spacing: 4px;
    }

    .win-sub {
      color: #88ffcc;
      font-size: 1rem;
      letter-spacing: 2px;
      max-width: 320px;
      line-height: 1.7;
    }

    .again-btn {
      padding: 14px 32px;
      background: #003300;
      border: 1.5px solid #00ff66;
      border-radius: 3px;
      color: #00ff66;
      font-family: 'Creepster', cursive;
      font-size: 1.4rem;
      letter-spacing: 4px;
      cursor: pointer;
      transition: all 0.2s;
      touch-action: manipulation;
    }
    .again-btn:hover, .again-btn:active {
      background: #005500;
      box-shadow: 0 0 24px rgba(0,255,102,0.4);
    }
  </style>
</head>
<body>

<!-- START SCREEN -->
<div id="start-screen" class="screen active">
  <p class="skull-row">☠ ☠ ☠ ☠ ☠</p>
  <h1 class="main-title">THE HAUNTED<br>MAZE</h1>
  <p class="tagline">Enter if you dare…</p>
  <div class="form-wrapper">
    <input
      type="text"
      class="name-input"
      id="player-name"
      placeholder="What is your name, brave soul?"
      maxlength="20"
      autocomplete="off"
      spellcheck="false"
    >
    <button class="enter-btn" id="enter-btn">BEGIN</button>
  </div>
  <p class="warning">⚠ &nbsp; Wear headphones &nbsp; ⚠</p>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
  <div class="hud">
    <span>☠</span>
    <span id="hud-name"></span>
    <span>☠</span>
  </div>
  <canvas id="maze-canvas"></canvas>
  <div class="dpad">
    <button class="dpad-btn u" data-dir="up">▲</button>
    <button class="dpad-btn l" data-dir="left">◄</button>
    <button class="dpad-btn r" data-dir="right">►</button>
    <button class="dpad-btn d" data-dir="down">▼</button>
  </div>
  <p class="game-hint">Reach the red portal — escape the maze</p>
</div>

<!-- JUMPSCARE OVERLAY -->
<div id="jumpscare-overlay">
  <div class="ghost-face">
    <div class="ghost-body">
      <div class="ghost-eyes">
        <div class="ghost-eye"></div>
        <div class="ghost-eye"></div>
      </div>
      <div class="ghost-mouth"></div>
    </div>
  </div>
</div>

<!-- WIN SCREEN -->
<div id="win-screen" class="screen">
  <div class="win-title">YOU ESCAPED!</div>
  <p class="win-sub" id="win-sub"></p>
  <button class="again-btn" id="again-btn">PLAY AGAIN</button>
</div>

<script>
/* =============================================
   BLOOD DRIPS – decorative
   ============================================= */
(function () {
  const positions = [5,12,19,27,38,51,63,72,82,91];
  positions.forEach(p => {
    const d = document.createElement('div');
    d.className = 'drip';
    const dur   = (2.5 + Math.random() * 3).toFixed(2);
    const delay = (Math.random() * 3).toFixed(2);
    d.style.cssText = `left:${p}%;width:${3 + Math.round(Math.random()*3)}px;--d:${dur}s;--delay:${delay}s;`;
    document.body.appendChild(d);
  });
})();

/* =============================================
   MAZE GENERATOR – recursive backtracker
   ============================================= */
const ROWS = 11, COLS = 11;
let maze = [];
let pRow = 1, pCol = 1;
let jsTimer = null;
let jsFired = false;
let gameActive = false;

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = (Math.random() * (i + 1)) | 0;
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildMaze() {
  maze = Array.from({length: ROWS}, () => Array(COLS).fill(1));

  function carve(r, c) {
    const dirs = shuffle([[0,2],[0,-2],[2,0],[-2,0]]);
    for (const [dr, dc] of dirs) {
      const nr = r + dr, nc = c + dc;
      if (nr > 0 && nr < ROWS-1 && nc > 0 && nc < COLS-1 && maze[nr][nc] === 1) {
        maze[r + dr/2][c + dc/2] = 0;
        maze[nr][nc] = 0;
        carve(nr, nc);
      }
    }
  }

  maze[1][1] = 0;
  carve(1, 1);
  maze[ROWS-2][COLS-2] = 2; // goal
}

/* =============================================
   CANVAS RENDERER
   ============================================= */
const canvas = document.getElementById('maze-canvas');
const ctx    = canvas.getContext('2d');
let cell     = 36;

function calcCell() {
  const maxW = Math.min(window.innerWidth * 0.96, 480);
  const maxH = window.innerHeight * 0.52;
  cell = Math.floor(Math.min(maxW / COLS, maxH / ROWS));
  canvas.width  = cell * COLS;
  canvas.height = cell * ROWS;
}

let portalPulse = 0;
function drawMaze() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  portalPulse = (portalPulse + 0.07) % (Math.PI * 2);
  const pulse = 0.7 + 0.3 * Math.sin(portalPulse);

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * cell, y = r * cell, v = maze[r][c];

      if (v === 1) {
        // wall
        ctx.fillStyle = '#18000f';
        ctx.fillRect(x, y, cell, cell);
        ctx.fillStyle = '#220018';
        ctx.fillRect(x + 1, y + 1, cell - 2, cell - 2);
        // subtle brick lines
        ctx.strokeStyle = '#300025';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(x + 2, y + 2, cell - 4, cell - 4);
      } else if (v === 2) {
        // portal / goal
        ctx.fillStyle = '#060006';
        ctx.fillRect(x, y, cell, cell);
        const cx = x + cell / 2, cy = y + cell / 2;
        const r2 = cell / 2.2 * pulse;
        const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, r2);
        grd.addColorStop(0,   'rgba(255,60,60,0.95)');
        grd.addColorStop(0.45,'rgba(180,0,0,0.7)');
        grd.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = grd;
        ctx.fillRect(x, y, cell, cell);
        // ring
        ctx.save();
        ctx.shadowColor = '#ff2222';
        ctx.shadowBlur  = 12;
        ctx.strokeStyle = `rgba(255,60,60,${0.6 + 0.4 * pulse})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy, cell / 3.2, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      } else {
        // open path
        ctx.fillStyle = '#0b0010';
        ctx.fillRect(x, y, cell, cell);
      }
    }
  }

  // Player – glowing orb
  const px = pCol * cell + cell / 2;
  const py = pRow * cell + cell / 2;
  const pr = cell / 2.8;

  ctx.save();
  ctx.shadowColor = '#99ddff';
  ctx.shadowBlur  = 18;
  const pGrd = ctx.createRadialGradient(px, py, 0, px, py, pr);
  pGrd.addColorStop(0,   '#ffffff');
  pGrd.addColorStop(0.35,'#aaddff');
  pGrd.addColorStop(1,   'rgba(100,180,255,0)');
  ctx.fillStyle = pGrd;
  ctx.beginPath();
  ctx.arc(px, py, pr, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

let animFrame;
function renderLoop() {
  if (gameActive) {
    drawMaze();
    animFrame = requestAnimationFrame(renderLoop);
  }
}

/* =============================================
   MOVEMENT
   ============================================= */
function tryMove(dc, dr) {
  if (!gameActive) return;
  const nr = pRow + dr, nc = pCol + dc;
  if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) return;
  const v = maze[nr][nc];
  if (v === 1) return;
  pRow = nr; pCol = nc;
  if (v === 2) { winGame(); }
}

// Keyboard
document.addEventListener('keydown', e => {
  const map = {
    ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0],
    w: [0,-1], s: [0,1], a: [-1,0], d: [1,0]
  };
  if (map[e.key]) { e.preventDefault(); tryMove(...map[e.key]); }
});

// D-pad buttons
document.querySelectorAll('.dpad-btn').forEach(btn => {
  const dirMap = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
  const fn = () => tryMove(...dirMap[btn.dataset.dir]);
  btn.addEventListener('click', fn);
  btn.addEventListener('touchstart', e => { e.preventDefault(); fn(); }, {passive:false});
});

// Swipe on canvas
let tx = 0, ty = 0;
canvas.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX; ty = e.touches[0].clientY;
  e.preventDefault();
}, {passive:false});
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy)) tryMove(dx > 0 ? 1 : -1, 0);
  else tryMove(0, dy > 0 ? 1 : -1);
  e.preventDefault();
}, {passive:false});

/* =============================================
   AUDIO – Web Audio API scream
   ============================================= */
function playScream() {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();

    // ── white noise ──
    const len  = ac.sampleRate * 2.8;
    const buf  = ac.createBuffer(1, len, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
    const noise = ac.createBufferSource();
    noise.buffer = buf;

    // ── scream oscillator 1 ──
    const o1 = ac.createOscillator();
    o1.type = 'sawtooth';
    const t = ac.currentTime;
    o1.frequency.setValueAtTime(160, t);
    o1.frequency.exponentialRampToValueAtTime(850,  t + 0.12);
    o1.frequency.exponentialRampToValueAtTime(420,  t + 0.4);
    o1.frequency.exponentialRampToValueAtTime(1100, t + 0.7);
    o1.frequency.exponentialRampToValueAtTime(350,  t + 1.1);
    o1.frequency.exponentialRampToValueAtTime(900,  t + 1.6);
    o1.frequency.exponentialRampToValueAtTime(200,  t + 2.3);

    // ── scream oscillator 2 ──
    const o2 = ac.createOscillator();
    o2.type = 'square';
    o2.frequency.setValueAtTime(180, t);
    o2.frequency.exponentialRampToValueAtTime(950,  t + 0.18);
    o2.frequency.exponentialRampToValueAtTime(500,  t + 0.55);
    o2.frequency.exponentialRampToValueAtTime(1200, t + 0.9);
    o2.frequency.exponentialRampToValueAtTime(300,  t + 1.4);
    o2.frequency.exponentialRampToValueAtTime(750,  t + 2.0);

    // ── distortion ──
    const dist  = ac.createWaveShaper();
    const curve = new Float32Array(512);
    const k     = 320;
    for (let i = 0; i < 512; i++) {
      const x = (i * 2) / 512 - 1;
      curve[i] = (Math.PI + k) * x / (Math.PI + k * Math.abs(x));
    }
    dist.curve = curve;

    // ── noise gain ──
    const ng = ac.createGain();
    ng.gain.setValueAtTime(0.25, t);
    ng.gain.linearRampToValueAtTime(0, t + 2.8);

    // ── osc gain ──
    const og = ac.createGain();
    og.gain.setValueAtTime(0, t);
    og.gain.linearRampToValueAtTime(2.2, t + 0.04);
    og.gain.setValueAtTime(2.2, t + 1.8);
    og.gain.linearRampToValueAtTime(0,   t + 2.6);

    noise.connect(ng);
    o1.connect(dist); o2.connect(dist);
    dist.connect(og);
    ng.connect(ac.destination);
    og.connect(ac.destination);

    noise.start(t); o1.start(t); o2.start(t);
    noise.stop(t + 2.8); o1.stop(t + 2.6); o2.stop(t + 2.6);

  } catch (err) { /* silently fail */ }
}

/* =============================================
   JUMPSCARE
   ============================================= */
const overlay = document.getElementById('jumpscare-overlay');

function fireJumpscare() {
  if (!gameActive || jsFired) return;
  jsFired = true;
  overlay.classList.add('show');
  playScream();
  setTimeout(() => overlay.classList.remove('show'), 2600);
}

function scheduleJumpscare() {
  clearTimeout(jsTimer);
  jsFired = false;
  // random between 6 and 22 seconds
  const delay = (6 + Math.random() * 16) * 1000;
  jsTimer = setTimeout(fireJumpscare, delay);
}

/* =============================================
   SCREEN SWITCHING
   ============================================= */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* =============================================
   GAME FLOW
   ============================================= */
let playerName = '';

function startGame() {
  const inp = document.getElementById('player-name');
  const val = inp.value.trim();
  if (!val) {
    inp.classList.add('error');
    setTimeout(() => inp.classList.remove('error'), 400);
    inp.focus();
    return;
  }
  playerName = val;
  document.getElementById('hud-name').textContent = playerName;

  buildMaze();
  pRow = 1; pCol = 1;
  gameActive = true;
  jsFired = false;

  showScreen('game-screen');
  calcCell();
  cancelAnimationFrame(animFrame);
  renderLoop();
  scheduleJumpscare();
}

function winGame() {
  gameActive = false;
  clearTimeout(jsTimer);
  cancelAnimationFrame(animFrame);
  overlay.classList.remove('show');
  document.getElementById('win-sub').textContent =
    `${playerName} escaped the haunted maze!\nThe spirits shall remember your name.`;
  showScreen('win-screen');
}

function resetGame() {
  gameActive = false;
  clearTimeout(jsTimer);
  cancelAnimationFrame(animFrame);
  overlay.classList.remove('show');
  document.getElementById('player-name').value = '';
  showScreen('start-screen');
}

/* =============================================
   EVENT BINDINGS
   ============================================= */
document.getElementById('enter-btn').addEventListener('click', startGame);
document.getElementById('player-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') startGame();
});
document.getElementById('again-btn').addEventListener('click', resetGame);

window.addEventListener('resize', () => {
  if (gameActive) { calcCell(); }
});
</script>
</body>
</html>
